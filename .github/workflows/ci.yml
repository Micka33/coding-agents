name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-build-smoke:
    name: Test, build, and smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON_DOWNLOADS: never
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.15"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Show tool versions
        run: |
          python --version
          uv --version

      - name: Sync locked dependencies
        run: uv sync --locked --python "${{ matrix.python-version }}"

      - name: Run unit tests
        run: uv run --no-sync python -m unittest discover -s tests

      - name: Build wheel
        run: uv build --wheel --out-dir dist

      - name: Install wheel in clean environment and run CLI smoke
        shell: bash
        run: |
          set -euo pipefail

          WHEEL="$(python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("coding_agents-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel in dist, found {len(wheels)}")
          print(wheels[0])
          PY
          )"

          SMOKE_VENV="${RUNNER_TEMP}/coding-agents-smoke-${{ matrix.python-version }}"
          uv venv --python "${{ matrix.python-version }}" "${SMOKE_VENV}"
          uv pip install --python "${SMOKE_VENV}/bin/python" "${WHEEL}"

          SMOKE_ROOT="$(mktemp -d)"
          SMOKE_CWD="$(mktemp -d)"
          (
            cd "${SMOKE_CWD}"
            "${SMOKE_VENV}/bin/python" -c "import coding_agents; print(coding_agents.__file__)"
            "${SMOKE_VENV}/bin/coding-agents" --root "${SMOKE_ROOT}" --init-only
          )
