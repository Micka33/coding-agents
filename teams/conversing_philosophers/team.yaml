schema_version: 1
id: philosophers
description: Multilingual philosopher team led by an English philosopher, with German and Japanese philosophers and a translator.

defaults:
  root_dir: "."
  model:
    default: openai:gpt-5.4-mini
  reasoning_effort:
    default: none
  checkpointer:
    default: sqlite
    sqlite_path:
      default: .coding-agents/philosophers-checkpoints.sqlite
  execution_backend:
    env: CODING_AGENTS_EXECUTION
    default: none
  memory:
    error_when_missing: false
    candidates: []

conversation:
  mentions:
    max_parallel_agents: 3
    max_cascade_turns: null
  identity_refresh_after_tokens: 10000
  # human_input:
  #   default_targets:
  #     - Francis-Bacon

agents:
  Francis-Bacon:
    kind: deepagent
    config: ./agents/francis-bacon.mdc
    entrypoint: true
    conversation:
      aliases:
        - Francis
        - Bacon
        - FrancisBacon
        - Francis_Bacon
        - Francis-Bacon

  Friedrich-Nietzsche:
    kind: deepagent
    config: ./agents/friedrich-nietzsche.mdc
    conversation:
      aliases:
        - Friedrich
        - Nietzsche
        - FriedrichNietzsche
        - Friedrich_Nietzsche
        - Friedrich-Nietzsche

  Hayashi-Razan:
    kind: deepagent
    config: ./agents/hayashi-razan.mdc
    conversation:
      aliases:
        - Hayashi
        - Razan
        - HayashiRazan
        - Hayashi_Razan
        - Hayashi-Razan

  translator:
    kind: subagent
    config: ./agents/translator.mdc

relations:
  - from: Francis-Bacon
    to: translator
    relation: subagent

  - from: Friedrich-Nietzsche
    to: translator
    relation: subagent

  - from: hayashi-razan
    to: translator
    relation: subagent
