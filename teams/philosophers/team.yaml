schema_version: 1
id: philosophers
description: Multilingual philosopher team led by an English philosopher, with German and Japanese philosophers and a translator.

defaults:
  root_dir: "."
  model:
    env: CODING_AGENTS_MODEL_XXXXX
    default: openai:gpt-5.4-mini
  reasoning_effort:
    env: CODING_AGENTS_REASONING_EFFORT_XXXX
    default: none
  checkpointer:
    env: CODING_AGENTS_CHECKPOINTER
    default: sqlite
    sqlite_path:
      env: CODING_AGENTS_SQLITE_CHECKPOINT_PATH
      default: .coding-agents/philosophers-checkpoints.sqlite
    postgres_url:
      env:
        - CODING_AGENTS_POSTGRES_URL
        - DATABASE_URL
      default: null
  execution_backend:
    env: CODING_AGENTS_EXECUTION
    default: none
  memory:
    error_when_missing: false
    candidates: []

custom_tools:
  english_message_counter:
    factory: teams.philosophers.conversation_counter_tools:create_conversation_counter_tools
    exposes:
      - count_english_messages

toolsets:
  conversation_counter:
    - custom: english_message_counter

agents:
  english-philosopher:
    kind: deepagent
    config: ./agents/english-philosopher.mdc
    entrypoint: true

  german-philosopher:
    kind: deepagent
    config: ./agents/german-philosopher.mdc

  japanese-philosopher:
    kind: deepagent
    config: ./agents/japanese-philosopher.mdc

  translator:
    kind: subagent
    config: ./agents/translator.mdc

relations:
  - from: english-philosopher
    to: translator
    relation: subagent

  - from: german-philosopher
    to: translator
    relation: subagent

  - from: japanese-philosopher
    to: translator
    relation: subagent

  - from: english-philosopher
    to: german-philosopher
    relation: tool
    tool_name: ask_german_philosopher
    input_schema:
      message: string
    description: >
      Converse with the German philosopher.

  - from: english-philosopher
    to: japanese-philosopher
    relation: tool
    tool_name: ask_japanese_philosopher
    input_schema:
      message: string
    description: >
      Converse with the Japanese philosopher.
