schema_version: 1
id: philosophers
description: Multilingual philosopher team led by an English philosopher, with German and Japanese philosophers and a translator.

defaults:
  root_dir: "."
  model:
    env: CODING_AGENTS_MODEL_XXXXX
    default: openai:gpt-5.4-mini
  reasoning_effort:
    env: CODING_AGENTS_REASONING_EFFORT_XXXX
    default: none
  checkpointer:
    env: CODING_AGENTS_CHECKPOINTER
    default: sqlite
    sqlite_path:
      env: CODING_AGENTS_SQLITE_CHECKPOINT_PATH
      default: .coding-agents/philosophers-checkpoints.sqlite
    postgres_url:
      env:
        - CODING_AGENTS_POSTGRES_URL
        - DATABASE_URL
      default: null
  execution_backend:
    env: CODING_AGENTS_EXECUTION
    default: none
  memory:
    error_when_missing: false
    candidates: []

custom_tools:
  english_message_counter:
    factory: teams.philosophers.conversation_counter_tools:create_conversation_counter_tools
    exposes:
      - count_english_messages

toolsets:
  conversation_counter:
    - custom: english_message_counter

conversation:
  mentions:
    max_parallel_agents: 2
    max_cascade_turns: null
  identity_refresh_after_tokens: 10000
  # human_input:
  #   default_targets:
  #     - Francis-Bacon

agents:
  Francis-Bacon:
    kind: deepagent
    config: ./agents/francis-bacon.mdc
    entrypoint: true
    conversation:
      aliases:
        - Francis
        - Bacon
        - FrancisBacon
        - Francis_Bacon
        - Francis-Bacon

  Friedrich-Nietzsche:
    kind: deepagent
    config: ./agents/friedrich-nietzsche.mdc
    conversation:
      aliases:
        - Friedrich
        - Nietzsche
        - FriedrichNietzsche
        - Friedrich_Nietzsche
        - Friedrich-Nietzsche

  Hayashi-Razan:
    kind: deepagent
    config: ./agents/hayashi-razan.mdc
    conversation:
      aliases:
        - Hayashi
        - Razan
        - HayashiRazan
        - Hayashi_Razan
        - Hayashi-Razan

  translator:
    kind: subagent
    config: ./agents/translator.mdc

relations:
  - from: Francis-Bacon
    to: translator
    relation: subagent

  - from: Friedrich-Nietzsche
    to: translator
    relation: subagent

  - from: hayashi-razan
    to: translator
    relation: subagent

  - from: Francis-Bacon
    to: Friedrich-Nietzsche
    relation: tool
    tool_name: ask_german_philosopher
    input_schema:
      message: string
    description: >
      Converse with the German philosopher (Friedrich Nietzsche).

  - from: Francis-Bacon
    to: hayashi-razan
    relation: tool
    tool_name: ask_japanese_philosopher
    input_schema:
      message: string
    description: >
      Converse with the Japanese philosopher (Hayashi Razan).
