schema_version: 1
id: software
description: A software development team.

defaults:
  root_dir: "."
  model:
    env: CODING_AGENTS_MODEL
    default: openai:gpt-5.5
  reasoning_effort:
    env: CODING_AGENTS_REASONING_EFFORT
    default: xhigh
  checkpointer:
    env: CODING_AGENTS_CHECKPOINTER
    default: sqlite
    sqlite_path:
      env: CODING_AGENTS_SQLITE_CHECKPOINT_PATH
      default: .coding-agents/checkpoints.sqlite
    postgres_url:
      env:
        - CODING_AGENTS_POSTGRES_URL
        - DATABASE_URL
      default: null
  execution_backend:
    env: CODING_AGENTS_EXECUTION
    default: local
  memory:
    error_when_missing: false
    candidates:
      - /AGENTS.md
      - /docs/development-agent-team-architecture.md

custom_tools:
  scoped_read_tools:
    factory: src.team_instanciator.scoped_read_tools_factory:create_scoped_read_tools
    exposes:
      - ls
      - read_file
      - glob
      - grep

toolsets:
  web:
    - web_search
    - fetch_url
  scoped_read_tools:
    - custom: scoped_read_tools
  write:
    - write_file
    - edit_file
  shell:
    - execute

agents:
  engineering-manager:
    kind: deepagent
    config: ./agents/engineering-manager.mdc
    entrypoint: true

  product-analyst:
    kind: deepagent
    config: ./agents/product-analyst.mdc

  software-architect:
    kind: deepagent
    config: ./agents/software-architect.mdc

  scout:
    kind: subagent
    config: ./agents/scout.mdc

  developer:
    kind: subagent
    config: ./agents/developer.mdc

  code-reviewer:
    kind: subagent
    config: ./agents/code-reviewer.mdc

  qa-engineer:
    kind: subagent
    config: ./agents/qa-engineer.mdc

  devops-engineer:
    kind: subagent
    config: ./agents/devops-engineer.mdc

  security-reviewer:
    kind: subagent
    config: ./agents/security-reviewer.mdc

  technical-writer:
    kind: subagent
    config: ./agents/technical-writer.mdc

relations:
  - from: engineering-manager
    to: product-analyst
    relation: tool
    tool_name: ask_product_analyst
    input_schema:
      message: string
    description: >
      Ask the resident product analyst a product, scope, requirements, MVP,
      prioritization, or acceptance-criteria question. This resident agent keeps
      conversation history across calls and durable-checkpointer restarts.

  - from: engineering-manager
    to: software-architect
    relation: tool
    tool_name: ask_software_architect
    input_schema:
      message: string
    description: >
      Ask the resident software architect an architecture, technical-design,
      dependency, risk, or decision-record question. This resident agent keeps
      conversation history across calls and durable-checkpointer restarts.

  - from: product-analyst
    to: software-architect
    relation: tool
    tool_name: ask_software_architect
    input_schema:
      message: string
    description: >
      Ask the resident software architect an architecture, technical-design,
      dependency, risk, or decision-record question. This resident agent keeps
      conversation history across calls and durable-checkpointer restarts.

  - from: developer
    to: qa-engineer
    relation: tool
    tool_name: ask_qa_engineer
    input_schema:
      message: string
    description: >
      Ask the qa-engineer to run tests, linters, build commands and report the results.

  - from: engineering-manager
    to: scout
    relation: subagent

  - from: engineering-manager
    to: developer
    relation: subagent

  - from: engineering-manager
    to: code-reviewer
    relation: subagent

  - from: engineering-manager
    to: qa-engineer
    relation: subagent

  - from: engineering-manager
    to: devops-engineer
    relation: subagent

  - from: engineering-manager
    to: security-reviewer
    relation: subagent

  - from: engineering-manager
    to: technical-writer
    relation: subagent

  - from: developer
    to: scout
    relation: subagent

  - from: developer
    to: code-reviewer
    relation: subagent

  - from: developer
    to: qa-engineer
    relation: subagent

  - from: developer
    to: devops-engineer
    relation: subagent

  - from: developer
    to: security-reviewer
    relation: subagent

  - from: developer
    to: technical-writer
    relation: subagent
